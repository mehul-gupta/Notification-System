spring:
  application:
    name: notification-system

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.example.notification: DEBUG

notification:
  retry:
    max-attempts: 3
    initial-interval-ms: 1000
    multiplier: 2.0

  queue:
    processor-threads: 4
    batch-size: 100

  channels:
    email:
      enabled: true
      mock: true

    sms:
      enabled: true
      mock: true

    push:
      enabled: true
      mock: true